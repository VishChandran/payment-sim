name: CI

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payment_sim
          POSTGRES_USER: payment_sim
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payment_sim -d payment_sim"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://payment_sim:ci-postgres-password@127.0.0.1:5432/payment_sim
      REDIS_HOST: 127.0.0.1
      CARD_FINGERPRINT_SECRET: ci-card-fingerprint-secret

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run test:core
      - name: Run API-backed reliability tests
        shell: bash
        run: |
          API_KEYS=ci-client:ci-api-key ADMIN_API_KEYS=ci-admin-key node api.js > api.log 2>&1 &
          API_PID=$!
          trap 'cat api.log; kill $API_PID 2>/dev/null || true' EXIT
          node -e "let n=0;const wait=()=>fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)throw Error()}).catch(()=>{if(++n>30)process.exit(1);setTimeout(wait,500)});wait()"
          API_KEY=ci-api-key npm run test-reliability
