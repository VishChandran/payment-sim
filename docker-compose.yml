# Development-only compose file. Supply values through .env; do not use this stack as-is in production.
x-runtime-environment: &runtime-environment
  NODE_ENV: development
  DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
  API_KEYS: ${API_KEYS:?Set API_KEYS in .env}
  ADMIN_API_KEYS: ${ADMIN_API_KEYS:?Set ADMIN_API_KEYS in .env}
  CARD_FINGERPRINT_SECRET: ${CARD_FINGERPRINT_SECRET:?Set CARD_FINGERPRINT_SECRET in .env}

services:
  migrate:
    build: .
    command: npm run migrate
    environment: *runtime-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    command: node api.js
    ports:
      - "3000:3000"
    environment:
      <<: *runtime-environment
      PORT: 3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    command: node worker.js
    environment: *runtime-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  outbox:
    build: .
    command: node outbox.js
    environment: *runtime-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}

volumes:
  postgres-data:
  redis-data:
