services:
  app:
    build: .
    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hybrid_banking
      REDIS_HOST: redis

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: hybrid_banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7

    ports:
      - "6379:6379"
